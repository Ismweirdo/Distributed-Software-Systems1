server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: chatroom-server

  # Redis enabled via Docker (docker.m.daocloud.io/library/redis:7-alpine)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10

  # MySQL database (production / stress testing)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:chatroom}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root123}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000

  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: Y2hhdHJvb20tc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNA==
  expiration: 604800000  # 7 days in milliseconds

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.chatroom: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

chatroom:
  websocket:
    mode: ${CHATROOM_WEBSOCKET_MODE:simple}
    user-destination-broadcast: ${CHATROOM_USER_DESTINATION_BROADCAST:/topic/unresolved-user-destination}
    user-registry-broadcast: ${CHATROOM_USER_REGISTRY_BROADCAST:/topic/simp-user-registry}
    relay:
      host: ${STOMP_RELAY_HOST:localhost}
      port: ${STOMP_RELAY_PORT:61613}
      client-login: ${STOMP_RELAY_CLIENT_LOGIN:guest}
      client-passcode: ${STOMP_RELAY_CLIENT_PASSCODE:guest}
      system-login: ${STOMP_RELAY_SYSTEM_LOGIN:guest}
      system-passcode: ${STOMP_RELAY_SYSTEM_PASSCODE:guest}
      virtual-host: ${STOMP_RELAY_VHOST:/}
      system-heartbeat-send-interval: ${STOMP_RELAY_HEARTBEAT_SEND_MS:10000}
      system-heartbeat-receive-interval: ${STOMP_RELAY_HEARTBEAT_RECEIVE_MS:10000}
  security:
    login-protection:
      ip-window-seconds: ${CHATROOM_SECURITY_LOGIN_IP_WINDOW_SECONDS:60}
      ip-max-attempts: ${CHATROOM_SECURITY_LOGIN_IP_MAX_ATTEMPTS:10}
      failure-threshold: ${CHATROOM_SECURITY_LOGIN_FAILURE_THRESHOLD:5}
      lock-seconds: ${CHATROOM_SECURITY_LOGIN_LOCK_SECONDS:900}
  file-storage:
    image-bucket: ${CHATROOM_FILE_IMAGE_BUCKET:images}
    attachment-bucket: ${CHATROOM_FILE_ATTACHMENT_BUCKET:attachments}
  gateway:
    enabled: ${CHATROOM_GATEWAY_ENABLED:false}
    external-base-url: ${CHATROOM_GATEWAY_EXTERNAL_BASE_URL:}
    api-prefix: ${CHATROOM_GATEWAY_API_PREFIX:/api}
    websocket-prefix: ${CHATROOM_GATEWAY_WS_PREFIX:/ws}
    public-files-prefix: ${CHATROOM_GATEWAY_PUBLIC_FILES_PREFIX:/api/files/public}

# Bot configuration
# Set API key via environment variable: export BOT_API_KEY=sk-your-key
# Or paste directly below (not recommended for production)
bot:
  default-api-key: ${BOT_API_KEY:}
  default-api-endpoint: ${BOT_API_ENDPOINT:https://api.deepseek.com/v1/chat/completions}
  default-model: ${BOT_API_MODEL:deepseek-chat}
  queue:
    max-size: 200
    poll-timeout-ms: 3000
  memory:
    cache-ttl-minutes: 60
    work-ttl-minutes: 30

qqce:
  access-token: ${QQCE_ACCESS_TOKEN:}

github:
  token: ${GITHUB_TOKEN:}
